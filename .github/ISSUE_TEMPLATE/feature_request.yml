name: Feature request
description: Propose a roadmap or product improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    attributes:
      label: Proposal
      description: Describe the product, simulation, UI, or data capability you want added.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why it matters
      description: Explain the impact on realism, explainability, or product value.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Scope
      description: Is this a small enhancement, a new subsystem, a realism upgrade, or a workflow improvement?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Notes
      description: Include assumptions, references, or rough implementation ideas if useful.
