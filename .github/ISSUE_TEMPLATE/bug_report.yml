name: Bug report
description: Report a defect in Orya One RaceSim
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    attributes:
      label: Summary
      description: What is broken, where did it appear, and how severe is the impact?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include configuration inputs, scenario assumptions, and expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect the product or simulation to do instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
      description: Include errors, screenshots, or odd output wording if relevant.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Browser, OS, Python version, Node version, and whether a trained model artifact exists.
    validations:
      required: true
