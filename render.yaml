services:
  - type: web
    name: orya-one-racesim-api
    env: python
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt && pip install -e packages/sim-core
    startCommand: cd apps/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: CORS_ORIGINS
        sync: false
